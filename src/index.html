<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>F1R3FLY Explainer Viewer</title>
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
		/>
	</head>
	<body>
		<div id="app">
			<header id="top-bar">
				<h1>F1R3FLY Explainer</h1>
				<button id="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle theme">
					<svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<circle cx="12" cy="12" r="5" />
						<line x1="12" y1="1" x2="12" y2="3" />
						<line x1="12" y1="21" x2="12" y2="23" />
						<line x1="4.2" y1="4.2" x2="5.6" y2="5.6" />
						<line x1="18.4" y1="18.4" x2="19.8" y2="19.8" />
						<line x1="1" y1="12" x2="3" y2="12" />
						<line x1="21" y1="12" x2="23" y2="12" />
						<line x1="4.2" y1="19.8" x2="5.6" y2="18.4" />
						<line x1="18.4" y1="5.6" x2="19.8" y2="4.2" />
					</svg>
					<svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" />
					</svg>
				</button>
			</header>
			<div id="main-area">
				<section id="svg-area">
					<div id="stage-buttons"></div>
					<div id="svg-container"></div>
					<div id="transport">
						<button id="play-pause" type="button" aria-label="Start playback">
							<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
								<polygon points="6,3 20,12 6,21" />
							</svg>
						</button>
						<input type="range" id="timeline" min="0" max="1" step="0.001" value="0" />
						<span id="time-display">0:00 / 1:00</span>
					</div>
				</section>
				<div id="resize-handle"><span class="grip"></span></div>
				<aside id="narrative-box">
					<div id="stage-label"></div>
					<div id="narrative-text"></div>
					<div id="speed-control">
						<button id="mute-btn" type="button" disabled aria-label="Toggle narration audio"></button>
						<button id="speed-down" type="button" aria-label="Lower speed">-</button>
						<input type="range" id="speed-slider" min="0" max="4" step="1" value="2" />
						<button id="speed-up" type="button" aria-label="Raise speed">+</button>
						<span id="speed-label">1x</span>
					</div>
				</aside>
			</div>
		</div>
		<script type="module" src="/main.ts"></script>
	</body>
</html>
