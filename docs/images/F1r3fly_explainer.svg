<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">F1R3FLY Explainer - 1x Whiteboard Animation</title>
  <desc id="desc">A 60 second marker-board SMIL animation showing the shift from sequential systems to message-first, type-checked concurrency.</desc>

  <defs>
    <linearGradient id="board_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03070f"/>
      <stop offset="65%" stop-color="#07101d"/>
      <stop offset="100%" stop-color="#0a1423"/>
    </linearGradient>

    <pattern id="board_grid" patternUnits="userSpaceOnUse" width="28" height="28">
      <path d="M28 0H0V28" fill="none" stroke="#20324f" stroke-width="0.6" opacity="0.3"/>
    </pattern>

    <filter id="chalk_glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="marker_arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9cc3f4"/>
    </marker>

    <style>
      .marker {
        font-family: "Comic Neue", "Bradley Hand", "Segoe Print", cursive;
        letter-spacing: 0.4px;
      }
      .mono {
        font-family: "JetBrains Mono", "IBM Plex Mono", monospace;
      }
      .panel {
        fill: none;
        stroke: #345173;
        stroke-width: 1.4;
        stroke-dasharray: 5 7;
        opacity: 0.55;
      }
      .scribble {
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node {
        fill: #16263c;
        stroke: #8fb8eb;
        stroke-width: 1.8;
      }
      .caption {
        fill: #b8d2f2;
        font-size: 12px;
      }
    </style>
  </defs>

  <rect x="8" y="8" width="1184" height="684" rx="18" fill="url(#board_bg)" stroke="#2b4364" stroke-width="2"/>
  <rect x="8" y="8" width="1184" height="684" rx="18" fill="url(#board_grid)"/>

  <text x="600" y="48" text-anchor="middle" class="marker" font-size="34" fill="#f3b14a" filter="url(#chalk_glow)">
    F1R3FLY Whiteboard Story
  </text>
  <text x="600" y="74" text-anchor="middle" class="mono" font-size="13" fill="#8fb6de">
    1x baseline (60s) - sequential bottlenecks to message-first correctness
  </text>

  <rect x="38" y="110" width="350" height="468" rx="10" class="panel"/>
  <rect x="424" y="110" width="350" height="468" rx="10" class="panel"/>
  <rect x="810" y="110" width="350" height="468" rx="10" class="panel"/>

  <text x="213" y="136" text-anchor="middle" class="marker" font-size="18" fill="#9fc3ee">Sequential Legacy</text>
  <text x="599" y="136" text-anchor="middle" class="marker" font-size="18" fill="#9fc3ee">Pi/Rho Message Core</text>
  <text x="985" y="136" text-anchor="middle" class="marker" font-size="18" fill="#9fc3ee">Correctness + BFT</text>

  <path d="M124 334 C330 248 458 262 636 182" class="scribble" stroke="#d66fa0" stroke-width="2" opacity="0.9"/>
  <text x="356" y="286" class="marker" font-size="19" fill="#d975a8" transform="rotate(-24 356 286)">
    Performance + Fault Tolerance
  </text>

  <path d="M784 214 C860 132 980 112 1074 112" class="scribble" stroke="#69a7f6" stroke-width="2" opacity="0.9"/>
  <text x="908" y="174" class="marker" font-size="18" fill="#6daefa" transform="rotate(-26 908 174)">
    CAPs Security + Neutral Sharding
  </text>

  <path d="M610 432 C810 396 1020 420 1128 560" class="scribble" stroke="#3fa86e" stroke-width="2" opacity="0.82"/>
  <text x="872" y="500" class="marker" font-size="18" fill="#48ba78" transform="rotate(15 872 500)">
    Machine Intelligence
  </text>

  <g id="timeline">
    <path d="M46 638 C180 626 318 648 450 638 C620 624 724 650 870 638 C980 630 1060 644 1152 638"
      class="scribble" stroke="#2f4869" stroke-width="24" opacity="0.8"/>
    <path d="M46 638 C180 626 318 648 450 638 C620 624 724 650 870 638 C980 630 1060 644 1152 638"
      class="scribble" stroke="#5ce2c3" stroke-width="8" stroke-linecap="round" opacity="0.72" stroke-dasharray="1120" stroke-dashoffset="1120">
      <animate attributeName="stroke-dashoffset" values="1120;0" dur="60s" repeatCount="indefinite"/>
    </path>

    <line x1="194" y1="622" x2="194" y2="656" stroke="#739ecf" stroke-width="1.2"/>
    <line x1="417" y1="622" x2="417" y2="656" stroke="#739ecf" stroke-width="1.2"/>
    <line x1="678" y1="622" x2="678" y2="656" stroke="#739ecf" stroke-width="1.2"/>
    <line x1="969" y1="622" x2="969" y2="656" stroke="#739ecf" stroke-width="1.2"/>

    <text x="52" y="621" class="mono" font-size="11" fill="#8cb5e2">S1</text>
    <text x="201" y="621" class="mono" font-size="11" fill="#8cb5e2">S2</text>
    <text x="424" y="621" class="mono" font-size="11" fill="#8cb5e2">S3</text>
    <text x="685" y="621" class="mono" font-size="11" fill="#8cb5e2">S4</text>
    <text x="976" y="621" class="mono" font-size="11" fill="#8cb5e2">S5</text>
  </g>

  <text x="600" y="102" text-anchor="middle" class="mono" font-size="12" fill="#86a9d0" opacity="0.9">
    Stage windows: 0-8s, 8-20s, 20-34s, 34-50s, 50-60s
  </text>

  <g id="stage_1_problem" opacity="1">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.133;0.15;1" dur="60s" repeatCount="indefinite"/>

    <text x="78" y="175" class="marker" font-size="16" fill="#f2c6cf">single instruction pointer</text>
    <path d="M74 204 H328" class="scribble" stroke="#ef8c99" stroke-width="5"/>
    <rect x="72" y="230" width="260" height="74" rx="8" fill="#22131f" stroke="#d16c7c" stroke-width="1.8"/>
    <text x="202" y="258" text-anchor="middle" class="marker" font-size="14" fill="#f5bac2">assembly-line scaling</text>
    <text x="202" y="280" text-anchor="middle" class="marker" font-size="13" fill="#f5bac2">more cores, same bottleneck</text>

    <rect x="82" y="330" width="248" height="152" rx="8" fill="#161f2d" stroke="#5f79a9" stroke-width="1.5"/>
    <text x="96" y="356" class="marker" font-size="14" fill="#cddff8">x lock contention</text>
    <text x="96" y="382" class="marker" font-size="14" fill="#cddff8">x race-condition surface</text>
    <text x="96" y="408" class="marker" font-size="14" fill="#cddff8">x deadlock recovery cost</text>
    <text x="96" y="434" class="marker" font-size="14" fill="#cddff8">x operational overhead</text>

    <circle cx="98" cy="204" r="9" fill="#ffce82" stroke="#f3b14a" stroke-width="1.8" filter="url(#chalk_glow)">
      <animate attributeName="cx" values="98;322" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.8" dur="1.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="stage_2_shift" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.13;0.133;0.333;0.35;1" dur="60s" repeatCount="indefinite"/>

    <path d="M336 246 C390 246 414 216 470 206" class="scribble" stroke="#77ddd1" stroke-width="3.4" stroke-dasharray="8 8" marker-end="url(#marker_arrow)">
      <animate attributeName="stroke-dashoffset" values="16;0" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M336 276 C402 302 430 332 482 360" class="scribble" stroke="#77ddd1" stroke-width="3.4" stroke-dasharray="8 8" marker-end="url(#marker_arrow)">
      <animate attributeName="stroke-dashoffset" values="16;0" dur="1.7s" repeatCount="indefinite"/>
    </path>

    <text x="512" y="187" class="marker" font-size="16" fill="#baf3ec">data arrives -> work starts</text>

    <rect x="474" y="206" width="250" height="190" rx="10" fill="#132637" stroke="#4cd5c7" stroke-width="1.8"/>
    <g stroke="#7fdff6" stroke-width="1.6" fill="#1a3046">
      <rect x="500" y="236" width="56" height="36" rx="6"/>
      <rect x="576" y="236" width="56" height="36" rx="6"/>
      <rect x="652" y="236" width="56" height="36" rx="6"/>
      <rect x="538" y="296" width="56" height="36" rx="6"/>
      <rect x="614" y="296" width="56" height="36" rx="6"/>
    </g>

    <circle cx="528" cy="254" r="5" fill="#ffd58d">
      <animate attributeName="cx" values="528;604;680;642;566;528" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="254;254;254;314;314;254" dur="3.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g id="stage_3_message_first" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.33;0.333;0.567;0.59;1" dur="60s" repeatCount="indefinite"/>

    <g stroke="#9cc5f4" stroke-width="2" fill="none" opacity="0.9">
      <line x1="504" y1="236" x2="600" y2="192"/>
      <line x1="600" y1="192" x2="696" y2="236"/>
      <line x1="504" y1="236" x2="560" y2="304"/>
      <line x1="696" y1="236" x2="640" y2="304"/>
      <line x1="560" y1="304" x2="640" y2="304"/>
    </g>

    <circle cx="504" cy="236" r="23" class="node"/>
    <circle cx="600" cy="192" r="23" class="node"/>
    <circle cx="696" cy="236" r="23" class="node"/>
    <circle cx="560" cy="304" r="23" class="node"/>
    <circle cx="640" cy="304" r="23" class="node"/>

    <circle cx="504" cy="236" r="5" fill="#f3b14a">
      <animate attributeName="r" values="5;8;5" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#f3b14a;#68dbc7;#f3b14a" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="192" r="5" fill="#f3b14a">
      <animate attributeName="r" values="5;8;5" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#f3b14a;#68dbc7;#f3b14a" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="696" cy="236" r="5" fill="#f3b14a">
      <animate attributeName="r" values="5;8;5" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#f3b14a;#68dbc7;#f3b14a" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
    </circle>

    <rect x="500" y="348" width="200" height="56" rx="10" fill="#281f38" stroke="#b38fff" stroke-width="2"/>
    <text x="600" y="372" text-anchor="middle" class="marker" font-size="14" fill="#f1e2ff">TYPE-CHECKED</text>
    <text x="600" y="392" text-anchor="middle" class="marker" font-size="14" fill="#f1e2ff">CHANNEL PROTOCOLS</text>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="1.4s" repeatCount="indefinite"/>
  </g>

  <g id="stage_4_correctness_performance" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.56;0.567;0.833;0.85;1" dur="60s" repeatCount="indefinite"/>

    <rect x="840" y="190" width="300" height="172" rx="10" fill="#14263a" stroke="#6fc98c" stroke-width="1.8"/>
    <text x="992" y="216" text-anchor="middle" class="marker" font-size="15" fill="#c6f0d0">correctness by construction</text>
    <text x="858" y="246" class="marker" font-size="13" fill="#c6f0d0">[x] protocol order</text>
    <text x="858" y="270" class="marker" font-size="13" fill="#c6f0d0">[x] deadlock checks</text>
    <text x="858" y="294" class="marker" font-size="13" fill="#c6f0d0">[x] linear resources</text>
    <text x="858" y="318" class="marker" font-size="13" fill="#c6f0d0">[x] safer concurrency</text>

    <g transform="translate(915 430)">
      <circle cx="0" cy="0" r="62" fill="#0f1f31" stroke="#6bc0e1" stroke-width="2"/>
      <path d="M-42 0 A42 42 0 1 1 42 0" fill="none" stroke="#395a7b" stroke-width="10" stroke-linecap="round"/>
      <path d="M-42 0 A42 42 0 0 1 42 0" fill="none" stroke="#5ad6c2" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
      <line x1="0" y1="0" x2="30" y2="-24" stroke="#f3b14a" stroke-width="4" stroke-linecap="round">
        <animateTransform attributeName="transform" type="rotate" values="-50 0 0;62 0 0;-38 0 0" dur="5.4s" repeatCount="indefinite"/>
      </line>
      <circle cx="0" cy="0" r="6" fill="#f3b14a"/>
      <text x="0" y="86" text-anchor="middle" class="marker" font-size="13" fill="#c8eaf6">throughput trajectory</text>
    </g>

    <g transform="translate(1030 430)">
      <line x1="0" y1="-36" x2="34" y2="-14" stroke="#7fa8d5" stroke-width="2"/>
      <line x1="0" y1="-36" x2="-34" y2="-14" stroke="#7fa8d5" stroke-width="2"/>
      <line x1="-34" y1="-14" x2="0" y2="8" stroke="#7fa8d5" stroke-width="2"/>
      <line x1="34" y1="-14" x2="0" y2="8" stroke="#7fa8d5" stroke-width="2"/>
      <line x1="-17" y1="-25" x2="17" y2="-25" stroke="#7fa8d5" stroke-width="2"/>
      <line x1="-17" y1="-3" x2="17" y2="-3" stroke="#7fa8d5" stroke-width="2"/>
      <text x="0" y="26" text-anchor="middle" class="marker" font-size="12" fill="#bdd8f6">Euler/Navier analogy</text>
    </g>

    <g transform="translate(1000 268)">
      <circle cx="-42" cy="0" r="8" fill="#91b8e9"/>
      <circle cx="0" cy="-24" r="8" fill="#91b8e9"/>
      <circle cx="40" cy="0" r="8" fill="#91b8e9"/>
      <circle cx="0" cy="24" r="8" fill="#91b8e9"/>
      <line x1="-34" y1="0" x2="-8" y2="-18" stroke="#91b8e9" stroke-width="1.8"/>
      <line x1="8" y1="-18" x2="32" y2="0" stroke="#91b8e9" stroke-width="1.8"/>
      <line x1="-34" y1="0" x2="-8" y2="18" stroke="#91b8e9" stroke-width="1.8"/>
      <line x1="8" y1="18" x2="32" y2="0" stroke="#91b8e9" stroke-width="1.8"/>

      <circle cx="40" cy="0" r="9" fill="#cf5a70">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40" cy="0" r="15" fill="none" stroke="#cf5a70" stroke-width="1.8" stroke-dasharray="4 4">
        <animate attributeName="stroke-dashoffset" values="0;16" dur="1.6s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <g id="stage_5_outcome" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.83;0.833;1" dur="60s" repeatCount="indefinite"/>

    <rect x="108" y="506" width="984" height="96" rx="14" fill="#1f3048" stroke="#f3b14a" stroke-width="2.2"/>
    <text x="600" y="542" text-anchor="middle" class="marker" font-size="29" fill="#ffdba0" filter="url(#chalk_glow)">
      Design. Verify. Deploy.
    </text>
    <text x="600" y="572" text-anchor="middle" class="marker" font-size="15" fill="#d5e5fa">
      Move from ad-hoc concurrency to provable message-first infrastructure.
    </text>

    <g transform="translate(600 430)">
      <ellipse cx="-24" cy="-3" rx="30" ry="16" fill="#59d8cb" opacity="0.86"/>
      <ellipse cx="24" cy="-3" rx="30" ry="16" fill="#7ee89f" opacity="0.86"/>
      <ellipse cx="-19" cy="16" rx="19" ry="10" fill="#59d8cb" opacity="0.72"/>
      <ellipse cx="19" cy="16" rx="19" ry="10" fill="#7ee89f" opacity="0.72"/>
      <rect x="-4" y="-18" width="8" height="42" rx="4" fill="#f3b14a"/>
      <line x1="-2" y1="-18" x2="-12" y2="-30" stroke="#f3b14a" stroke-width="2"/>
      <line x1="2" y1="-18" x2="12" y2="-30" stroke="#f3b14a" stroke-width="2"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="2.6s" repeatCount="indefinite"/>
    </g>

    <g transform="translate(446 430)">
      <circle cx="0" cy="0" r="22" fill="#13293c" stroke="#67d9c8" stroke-width="1.8"/>
      <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" fill="#c6f4ef">D</text>
      <text x="0" y="38" text-anchor="middle" class="marker" font-size="12" fill="#9ee8de">Design</text>
    </g>
    <g transform="translate(600 430)">
      <circle cx="0" cy="0" r="22" fill="#13293c" stroke="#8dc0ff" stroke-width="1.8"/>
      <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" fill="#d8e9ff">V</text>
      <text x="0" y="38" text-anchor="middle" class="marker" font-size="12" fill="#b7d7ff">Verify</text>
    </g>
    <g transform="translate(754 430)">
      <circle cx="0" cy="0" r="22" fill="#13293c" stroke="#f3b14a" stroke-width="1.8"/>
      <text x="0" y="5" text-anchor="middle" class="mono" font-size="12" fill="#ffe4bc">P</text>
      <text x="0" y="38" text-anchor="middle" class="marker" font-size="12" fill="#ffd391">Deploy</text>
    </g>
  </g>
</svg>
